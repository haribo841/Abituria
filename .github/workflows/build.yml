name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore Abituria.sln --configfile NuGet.Config
      - name: Build
        run: dotnet build Abituria.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test Abituria.sln --configuration Release --no-build
