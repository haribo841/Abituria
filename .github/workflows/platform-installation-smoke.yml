name: platform-installation-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  portable-installation-smoke:
    name: Portable installation smoke - ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-2025
          - rid: linux-x64
            runner: ubuntu-24.04
          - rid: osx-x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            packages.lock.json
            tests/Abituria.Tests/packages.lock.json
      - name: Install Linux desktop smoke-test dependencies
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install --yes xvfb libx11-6 libice6 libsm6 libfontconfig1
      - name: Restore in locked mode
        run: dotnet restore Abituria.sln --configfile NuGet.Config --locked-mode
      - name: Publish a self-contained portable application
        run: >-
          dotnet publish Abituria.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --no-restore
          --output "$env:RUNNER_TEMP/published"
          -p:PublishTrimmed=false
          -p:PublishAot=false
          -p:PublishReadyToRun=false
          -p:PublishSingleFile=false
          -p:DebugSymbols=false
          -p:DebugType=None
          -p:SourceRevisionId=${{ github.sha }}
      - name: Archive and extract into a clean install directory
        run: |
          $packageRoot = Join-Path $env:RUNNER_TEMP "Abituria-portable-${{ matrix.rid }}"
          $archiveRoot = Join-Path $env:RUNNER_TEMP "archive-source"
          $installRoot = Join-Path $env:RUNNER_TEMP "installed"
          New-Item -ItemType Directory -Path $packageRoot, $archiveRoot, $installRoot -Force | Out-Null
          Copy-Item -Path "$env:RUNNER_TEMP/published/*" -Destination $packageRoot -Recurse -Force

          if ("${{ matrix.rid }}" -eq "linux-x64") {
            $archive = Join-Path $env:RUNNER_TEMP "Abituria-portable.tar.gz"
            tar -czf $archive -C $env:RUNNER_TEMP "Abituria-portable-${{ matrix.rid }}"
            tar -xzf $archive -C $installRoot
          }
          elseif ("${{ matrix.rid }}" -eq "osx-x64") {
            $archive = Join-Path $env:RUNNER_TEMP "Abituria-portable.zip"
            & ditto -c -k --keepParent $packageRoot $archive
            if ($LASTEXITCODE -ne 0) { throw "Nie udało się utworzyć archiwum macOS." }
            & ditto -x -k $archive $installRoot
            if ($LASTEXITCODE -ne 0) { throw "Nie udało się rozpakować archiwum macOS." }
          }
          else {
            $archive = Join-Path $env:RUNNER_TEMP "Abituria-portable.zip"
            Compress-Archive -Path $packageRoot -DestinationPath $archive -Force
            Expand-Archive -LiteralPath $archive -DestinationPath $installRoot -Force
          }
      - name: Run the installed application smoke test
        run: |
          $installDirectory = Join-Path $env:RUNNER_TEMP "installed/Abituria-portable-${{ matrix.rid }}"
          $dataDirectory = Join-Path $env:RUNNER_TEMP "smoke-data"
          $executable = switch ("${{ matrix.rid }}") {
            "win-x64" { Join-Path $installDirectory "Abituria.exe" }
            "linux-x64" { Join-Path $installDirectory "Abituria" }
            "osx-x64" { Join-Path $installDirectory "Abituria" }
          }
          if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
            throw "Brak pliku wykonywalnego po niezależnym rozpakowaniu: $executable"
          }

          if ("${{ matrix.rid }}" -eq "linux-x64") {
            & xvfb-run -a $executable --release-smoke-test --data-directory $dataDirectory
          }
          else {
            & $executable --release-smoke-test --data-directory $dataDirectory
          }
          if ($LASTEXITCODE -ne 0) {
            throw "Smoke test zainstalowanej paczki zakończył się kodem $LASTEXITCODE."
          }
